# Phase 12B/12C correction — EduRAG CI (Postgres-only).
#
# Why a Postgres service container:
#
#   Prisma 5.x rejects `provider = env("DATABASE_PROVIDER")` at validation
#   time, so we cannot switch SQLite ⇄ Postgres at runtime. The schema is
#   now `provider = "postgresql"` (literal). The CI job therefore needs a
#   real Postgres reachable at build/test time:
#
#     - We boot postgres:16-alpine as a job service.
#     - We point DATABASE_URL + DIRECT_URL at it (no pooler in CI; the same
#       URL is used for both).
#     - We run `prisma db push --skip-generate --accept-data-loss` to
#       materialise the schema directly from prisma/schema.prisma. We
#       deliberately do NOT use `prisma migrate deploy` here because the
#       repo no longer ships a committed Postgres migration history
#       (the SQLite migrations are archived under prisma/migrations-sqlite/
#       for reference; a fresh Postgres migration set will be regenerated
#       by the operator before the first Vercel deploy and committed
#       separately).
#
# The build runs against the same Postgres so Next.js's static-prerender
# pass (which invokes Prisma probes from the global <AppShell>) finds the
# tables it expects. The <DatasetModeBanner> fallback added in Phase 12A
# still protects us if anything in this chain breaks.
#
# ---------------------------------------------------------------------------
# CI credentials posture (GitGuardian context):
#
#   `edurag_ci_password` is an INTENTIONALLY FIXED, URL-safe, CI-only
#   throwaway literal. It is:
#     - bound to the postgres service container in this single workflow run
#     - reachable only from inside the runner (the service exposes
#       :5432 on the runner's localhost; no public network)
#     - destroyed when the runner is torn down at the end of the job
#     - NOT a production credential — production runs on Vercel + Neon
#       with secrets that live only in the Vercel project env
#
#   Why a literal instead of `${{ secrets.* }}`:
#     A previous version of this workflow used
#     `${{ secrets.CI_POSTGRES_PASSWORD || 'fallback' }}` and constructed
#     DATABASE_URL by string interpolation. That broke `prisma db push`
#     with P1013 ("invalid port number in database URL") when a real
#     secret value contained URL-unsafe characters (`:`, `/`, `@`, `?`,
#     `#`, `&`, `+`, `=`, `%`, …). A fixed URL-safe literal removes the
#     class of bug entirely.
#
#   If GitGuardian flags this literal as a secret: it is not. Mark as
#   resolved / not a leak / sample credential per their dashboard
#   options. Alternative: switch to a GitHub Actions secret AND
#   URL-encode it before constructing the DSN (e.g. via a `uses:`
#   step that runs `python -c "urllib.parse.quote(...)"`). The fixed
#   literal is the simpler, less-bug-prone path.
# ---------------------------------------------------------------------------

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16-alpine
        env:
          # CI-only throwaway credentials — see header comment above.
          POSTGRES_USER: edurag
          POSTGRES_PASSWORD: edurag_ci_password
          POSTGRES_DB: edurag
        ports:
          - 5432:5432
        # GitHub-Actions services don't run docker-compose-style healthchecks
        # by default — wire one up explicitly so we don't race the db's
        # first-boot before `prisma db push`.
        options: >-
          --health-cmd="pg_isready -U edurag -d edurag"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    env:
      # Fixed URL-safe DSN — must match the service container env above.
      # Both URLs are identical in CI (no connection pooler).
      DATABASE_URL: postgresql://edurag:edurag_ci_password@localhost:5432/edurag
      DIRECT_URL: postgresql://edurag:edurag_ci_password@localhost:5432/edurag
      # Keep CI noise low for the optional Python engine probes — there's
      # no Python on the GitHub runner by default and the TS baseline is
      # the only thing the tests exercise.
      ENABLE_PYTHON_ENGINE: "false"
      # Stay in local-demo mode for CI — the hosted-only banner + upload
      # row-cap are tested via unit overrides, not env coupling.
      DEMO_MODE: "local"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Next.js build output
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx', 'prisma/schema.prisma') }}
          restore-keys: |
            ${{ runner.os }}-next-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-next-

      - name: Generate Prisma client
        # `npm ci` already runs the package.json `postinstall: prisma generate`
        # step, so this is redundant — kept as an explicit guarantee that
        # the client matches the committed schema before `db push`.
        run: npx prisma generate

      - name: Materialise Postgres schema
        # `db push` works without any migration history — it diffs the
        # schema against the live DB and creates whatever's missing. Safe
        # in CI because the Postgres service is empty on every run.
        run: npx prisma db push --skip-generate --accept-data-loss

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        # package.json `build` is `prisma generate && next build` so the
        # Prisma client is regenerated one more time immediately before
        # Next sees it — defence in depth for Vercel's dep-cache scenario.
        run: npm run build
