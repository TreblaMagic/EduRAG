# Phase 12A — EduRAG CI (fix: apply Prisma migrations before next build)
#
# Typecheck + tests + build on every PR to main and every push to main.
# Deliberately does NOT deploy — Vercel handles its own build/deploy when
# the repo is connected (Phase 12C).
#
# Why we run `prisma migrate deploy` before `next build`:
#
#   Next.js evaluates server components during the build to collect page
#   data even for dynamic pages, and the global <AppShell> renders
#   <DatasetModeBanner> which calls Prisma. Without an applied schema the
#   underlying SQLite database file has no tables and the build crashes
#   with "The table `main.Student` does not exist".
#
#   `prisma migrate deploy` is non-interactive and idempotent — it applies
#   every committed migration if the DB exists, or creates it from scratch
#   if it doesn't. We don't run `prisma db seed` in CI — the goal is only
#   to ensure tables exist so the build's Prisma probes return empty
#   results (zero rows) instead of throwing.
#
# Uses SQLite throughout. Phase 12B will introduce the env-driven multi-
# provider schema; the env vars below are already shaped for that future.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_PROVIDER: sqlite
      DATABASE_URL: "file:./prisma/dev.db"
      # Keep CI noise low for the optional Python engine probes — there's
      # no Python on the GitHub runner by default and the TS baseline is
      # the only thing the tests exercise.
      ENABLE_PYTHON_ENGINE: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Next.js build output
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx', 'prisma/schema.prisma') }}
          restore-keys: |
            ${{ runner.os }}-next-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-next-

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply Prisma migrations
        # `migrate deploy` is the right tool for CI — non-interactive,
        # idempotent, applies every committed migration. If migrations
        # are missing or incompatible for any reason, fall back to
        # `prisma db push` which materialises the current schema directly
        # against the empty SQLite DB without needing a migration history.
        run: |
          npx prisma migrate deploy \
            || (echo "migrate deploy failed; falling back to db push" \
                && npx prisma db push --skip-generate --accept-data-loss)

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
