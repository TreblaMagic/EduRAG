# =============================================================================
# EduRAG — docker-compose (Postgres + app).
#
# Phase 12B/12C correction (2026-05-30): EduRAG is Postgres-only now —
# Prisma 5.x does not support an env-driven `provider`, so we cannot
# switch SQLite ⇄ Postgres at runtime. Local dev runs against the `db`
# service below; SQLite is no longer the default.
#
#   docker compose up -d db          # Postgres only (port 5432)
#   docker compose up                # full app + db
#
# Secrets:
#   - POSTGRES_PASSWORD is read from your `.env` (or the shell). A
#     safe local-only default is interpolated when the var is unset.
#     The literal "edurag_local_password" is intentional and obvious;
#     it must NEVER be used outside this docker-compose stack.
#   - For Vercel + Neon (production), DATABASE_URL / DIRECT_URL /
#     CRON_SECRET are pasted into the Vercel project env block —
#     no compose involvement.
#
# Volumes:
#   - edurag_data : Generated synthetic CSV + Shell University seed
#   - edurag_pg   : Postgres data directory
# =============================================================================

services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-edurag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-edurag_local_password}
      POSTGRES_DB: ${POSTGRES_DB:-edurag}
    volumes:
      - edurag_pg:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-edurag} -d ${POSTGRES_DB:-edurag}"]
      interval: 5s
      timeout: 3s
      retries: 10

  edurag:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      # In-network address — uses the compose service name, not localhost.
      DATABASE_URL: "postgresql://${POSTGRES_USER:-edurag}:${POSTGRES_PASSWORD:-edurag_local_password}@db:5432/${POSTGRES_DB:-edurag}?schema=public"
      DIRECT_URL: "postgresql://${POSTGRES_USER:-edurag}:${POSTGRES_PASSWORD:-edurag_local_password}@db:5432/${POSTGRES_DB:-edurag}?schema=public"
    volumes:
      - edurag_data:/app/data
    restart: unless-stopped

volumes:
  edurag_data:
  edurag_pg:
